<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tank — Hand Controlled</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');
@import url('https://fonts.cdnfonts.com/css/intro-rust');

:root {
  --teal:     #00bcd4;
  --teal-dim: #006978;
  --glow:     #4fc3f7;
  --gold:     #ffd166;
  --accent:   #ff6b35;
  --deep:     #020d18;
  --text-dim: #1e5f78;
  --text-ui:  #2d8aaa;
  --white:    #e8f4fd;
  --font-s:   'Intro Rust', 'Instrument Serif', Georgia, serif;
  --font-m:   'DM Mono', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

/* ── VIDEO ── */
#video {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transform: scaleX(-1); z-index: 0;
  filter: saturate(0.12) brightness(0.48) sepia(0.4) hue-rotate(158deg);
}
#water-tint {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: linear-gradient(180deg,rgba(0,14,28,.6) 0%,rgba(0,25,45,.38) 40%,rgba(0,10,22,.65) 100%);
}
#scanlines {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
}
#vignette {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(ellipse at center,transparent 28%,rgba(0,8,18,.55) 68%,rgba(0,4,12,.9) 100%);
}
#hand-canvas { position: fixed; inset: 0; z-index: 11; transform: scaleX(-1); pointer-events: none; }
#surface {
  position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 12; pointer-events: none;
  background: linear-gradient(90deg,transparent,rgba(79,195,247,.15) 15%,rgba(129,212,250,.6) 40%,rgba(79,195,247,.9) 55%,rgba(129,212,250,.4) 72%,rgba(79,195,247,.15) 85%,transparent);
  background-size: 300% 100%; animation: sflow 5s linear infinite;
}
@keyframes sflow { 0%{background-position:100% 0} 100%{background-position:-200% 0} }
#ripple-canvas { position: fixed; inset: 0; z-index: 13; pointer-events: none; opacity: .75; }

/* ── FOOD ── */
.food {
  position: fixed; font-family: var(--font-m); font-size: 11px;
  pointer-events: none; z-index: 14; color: var(--gold);
  filter: drop-shadow(0 0 4px rgba(255,209,102,.9));
}
#pinch-food {
  position: fixed; pointer-events: none; z-index: 20;
  font-family: var(--font-m); font-size: 12px; color: var(--gold);
  letter-spacing: 3px; filter: drop-shadow(0 0 8px var(--gold));
  transform: translate(-50%,-50%); opacity: 0; transition: opacity .15s;
}

/* ── FISH — bigger base size ── */
.fish {
  position: fixed; font-family: var(--font-m); font-weight: 500;
  white-space: nowrap; pointer-events: none; will-change: transform;
  letter-spacing: 0px; z-index: 15;
}
.fish-shadow {
  position: fixed; font-family: var(--font-m); font-weight: 500;
  white-space: nowrap; pointer-events: none; opacity: .12;
  filter: blur(3px); letter-spacing: 0px; color: #000 !important; z-index: 14;
}

/* ── GREEN PLANTS ONLY ── */
.seaweed {
  position: fixed; font-family: var(--font-m); pointer-events: none;
  transform-origin: bottom center; line-height: 1.15; z-index: 6;
  white-space: pre; animation: wsway ease-in-out infinite;
}
@keyframes wsway { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }

.kelp {
  position: fixed; font-family: var(--font-m); pointer-events: none;
  transform-origin: bottom center; line-height: 1.1; z-index: 5;
  white-space: pre; animation: ksway ease-in-out infinite;
}
@keyframes ksway {
  0%  { transform: rotate(-5deg) scaleX(1); }
  25% { transform: rotate(3deg) scaleX(1.02); }
  50% { transform: rotate(-2deg) scaleX(.99); }
  75% { transform: rotate(4deg) scaleX(1.01); }
  100%{ transform: rotate(-5deg) scaleX(1); }
}

/* ── BUBBLES ── */
.bubble {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 16;
  animation: brise linear forwards;
}
@keyframes brise {
  0%  {opacity:.7;transform:translateX(0) scale(1);}
  40% {opacity:.5;transform:translateX(6px) scale(1.05);}
  100%{opacity:0;transform:translateX(-3px) scale(.7) translateY(-14px);}
}
.ripple-ring {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 17;
  transform: translate(-50%,-50%) scale(0); animation: rexp ease-out forwards;
}
@keyframes rexp { 0%{transform:translate(-50%,-50%) scale(0);opacity:.9} 100%{transform:translate(-50%,-50%) scale(1);opacity:0} }

#shockwave {
  position: fixed; border-radius: 50%; border: 2px solid var(--accent);
  box-shadow: 0 0 18px var(--accent),inset 0 0 18px rgba(255,107,53,.12);
  pointer-events: none; z-index: 18; opacity: 0;
}

/* ── HERMIT CRAB ── */
.crab {
  position: fixed; font-family: var(--font-m); pointer-events: none;
  z-index: 20; white-space: nowrap; line-height: 1;
  color: #c0622a;
  text-shadow: 0 0 6px rgba(180,80,20,0.7);
}

#seabed { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; z-index: 19; pointer-events: none; }
#seabed-grad { position: absolute; inset: 0; background: linear-gradient(to top,rgba(0,5,12,.95) 0%,rgba(0,12,24,.6) 60%,transparent 100%); }
#seabed-txt {
  position: absolute; bottom: 0; left: 0; right: 0; height: 22px;
  font-family: var(--font-m); font-size: 11px; color: #0c2a0e;
  letter-spacing: 1px; overflow: hidden; display: flex; align-items: center;
  padding: 0 8px; white-space: nowrap; text-shadow: 0 0 5px #1a5a20;
}

/* ── HUD ── */
#hud { position: fixed; inset: 0; z-index: 30; pointer-events: none; }
#title-block { position: absolute; top: 26px; left: 34px; opacity:0; animation: fin 1s .4s forwards; }
@keyframes fin { to{opacity:1} }
#title-word {
  font-family: 'Intro Rust', 'Instrument Serif', Georgia, serif;
  font-style: normal; font-weight: 400;
  font-size: clamp(28px, 3.8vw, 52px);
  color: var(--white);
  text-shadow: 0 0 40px rgba(79,195,247,.4), 0 2px 0 rgba(0,0,0,.3);
  line-height: 1; letter-spacing: 0.04em;
}
#title-sub  { font-family:var(--font-m); font-size:10px; font-weight:300; color:#9aabb8; letter-spacing:.25em; text-transform:uppercase; margin-top:6px; }
#gestures { display:flex; flex-direction:column; gap:5px; margin-top:12px; }
.g-row { display:flex; align-items:center; gap:8px; font-family:var(--font-m); font-size:11px; color:var(--text-dim); letter-spacing:.08em; }
.g-label { color:var(--text-ui); }
#counter { position:absolute; top:26px; right:34px; font-family:var(--font-m); font-size:10px; color:var(--text-dim); letter-spacing:.2em; text-transform:uppercase; opacity:0; animation:fin 1s 1.1s forwards; text-align:right; }
#counter span { display:block; font-family:var(--font-s); font-size:26px; color:var(--glow); text-shadow:0 0 14px var(--teal); margin-bottom:2px; }
#gesture-state { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:var(--font-m); font-size:11px; color:var(--text-dim); letter-spacing:.2em; text-transform:uppercase; opacity:0; transition:opacity .3s; text-align:center; text-shadow:0 0 10px var(--teal); }

/* ── START SCREEN ── */
#permission-screen {
  position:fixed; inset:0; z-index:100; background:var(--deep);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#permission-screen h1 { font-family:var(--font-s); font-style:italic; font-size:clamp(32px,5vw,64px); color:var(--white); text-shadow:0 0 40px rgba(79,195,247,.4); }
#permission-screen p  { font-family:var(--font-m); font-size:11px; color:var(--text-dim); letter-spacing:.2em; text-transform:uppercase; text-align:center; max-width:340px; line-height:2; }
#start-btn { margin-top:10px; font-family:var(--font-m); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--teal); border:1px solid var(--teal-dim); background:transparent; padding:10px 28px; cursor:pointer; transition:all .2s; border-radius:999px; }
#start-btn:hover { background:rgba(0,188,212,.08); box-shadow:0 0 20px rgba(0,188,212,.2); }
#ascii-logo { font-family:var(--font-m); font-size:13px; color:var(--teal-dim); text-shadow:0 0 8px var(--teal); letter-spacing:3px; }

/* ── INTRO ── */
#intro { position:fixed; inset:0; z-index:50; background:var(--deep); pointer-events:none; display:flex; align-items:center; justify-content:center; }
#intro.wipe { animation:wipe .9s cubic-bezier(.76,0,.24,1) forwards; }
@keyframes wipe { 0%{clip-path:inset(0 0 0 0);opacity:1} 100%{clip-path:inset(50% 0 50% 0);opacity:0} }
#intro-txt { font-family:var(--font-m); font-size:11px; color:var(--text-dim); letter-spacing:.3em; text-transform:uppercase; }

/* ── HAND INDICATOR — palm dot ── */
#palm-cursor {
  position: fixed; z-index: 25; pointer-events: none;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(79,195,247,0.5);
  box-shadow: 0 0 14px rgba(79,195,247,0.3);
  transform: translate(-50%,-50%);
  opacity: 0; transition: opacity .2s;
}

/* Mobile responsive styles */
@media (max-width: 767px) {
  #title-word {
    font-size: clamp(24px, 4.5vw, 36px);
  }
  #title-block {
    top: 16px; left: 20px;
  }
  #counter {
    top: 16px; right: 20px;
  }
  .g-row {
    font-size: 10px;
  }
  #title-sub {
    display: none;
  }
}
</style>
</head>
<body>

<div id="permission-screen">
  <div id="ascii-logo">><((( · ></div>
  <h1>Tank</h1>
  <p>Hand-controlled with MediaPipe<br>Requires camera access</p>
  <button id="start-btn" onclick="startExperience()">Enable Camera →</button>
</div>

<div id="intro"><div id="intro-txt">Waking up the fish...</div></div>

<video id="video" autoplay playsinline muted></video>
<div id="water-tint"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="surface"></div>
<canvas id="ripple-canvas"></canvas>
<canvas id="hand-canvas"></canvas>
<div id="seabed"><div id="seabed-grad"></div><div id="seabed-txt"></div></div>
<div id="pinch-food">· • · • ·</div>
<div id="shockwave"></div>
<div id="palm-cursor"></div>

<div id="hud">
  <div id="title-block">
    <div id="title-word">Tank</div>
    <div id="title-sub">Gesture-driven · MediaPipe · Creative Technology</div>
    <div id="gestures">
      <div class="g-row"><span class="g-label">Pinch &amp; release</span><span>— drop food</span></div>
      <div class="g-row"><span class="g-label">Open hand</span><span>— fish follow</span></div>
      <div class="g-row"><span class="g-label">Fist knock</span><span>— scatter fish</span></div>
    </div>
  </div>
  <div id="counter"><span id="count-num">0</span>fish count</div>
  <div id="gesture-state"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script>
/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
const $ = id => document.getElementById(id);
const W = () => window.innerWidth;
const H = () => window.innerHeight;
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function rnd(a,b){ return a+Math.random()*(b-a); }
function mirrorX(nx){ return (1-nx)*W(); }
function toScreen(lm){ return {x:mirrorX(lm.x), y:lm.y*H()}; }
// Smooth lerp
function lerp(a,b,t){ return a+(b-a)*t; }

/* ══════════════════════════════════════
   AUDIO — removed
══════════════════════════════════════ */
function playPlop()  {}
function playScare() {}
function playEat()   {}
function playPinch() {}

/* ══════════════════════════════════════
   CANVAS — ripples + hand overlay
══════════════════════════════════════ */
const rcanvas=$('ripple-canvas'), rctx=rcanvas.getContext('2d');
const hcanvas=$('hand-canvas'),   hctx=hcanvas.getContext('2d');
let ripples=[];

function resizeCanvas(){
  rcanvas.width=hcanvas.width=W();
  rcanvas.height=hcanvas.height=H();
}

function addRipple(x,y,maxR,col,spd){
  ripples.push({x,y,r:2,maxR,col:col||'rgba(79,195,247,',spd:spd||1.5,alpha:.6});
}

function drawRipples(){
  rctx.clearRect(0,0,rcanvas.width,rcanvas.height);
  ripples=ripples.filter(r=>r.alpha>.01);
  for(const r of ripples){
    rctx.beginPath();rctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    rctx.strokeStyle=r.col+r.alpha+')';rctx.lineWidth=1;rctx.stroke();
    r.r+=r.spd;r.alpha*=.955;if(r.r>r.maxR)r.alpha=0;
  }
}

function drawHandOverlay(landmarks){
  hctx.clearRect(0,0,hcanvas.width,hcanvas.height);
  // Hand tracking overlay hidden
}

/* ══════════════════════════════════════
   DECOR — green plants only
══════════════════════════════════════ */
function buildSeaweed(){
  document.querySelectorAll('.seaweed').forEach(e=>e.remove());
  const count=Math.floor(W()/90)+6;
  const isMobile = W() <= 767;
  for(let i=0;i<count;i++){
    const el=document.createElement('div'); el.className='seaweed';
    const rows=isMobile ? 3+Math.floor(Math.random()*6) : 5+Math.floor(Math.random()*10);
    let txt='';
    for(let r=rows;r>=0;r--) txt+=(r%2===0?'/':'\\')+'\n';
    txt+='~';
    el.textContent=txt;
    const hue=115+Math.random()*35, sat=55+Math.random()*25, lig=22+Math.random()*12;
    // Evenly slot across full width
    const slotW=100/count;
    const xPct=i*slotW + Math.random()*slotW*0.8;
    el.style.cssText=`
      left:${xPct}%;
      bottom:${18+Math.random()*6}px;
      font-size:${isMobile ? 8+Math.random()*4 : 13+Math.random()*6}px;
      color:hsl(${hue},${sat}%,${lig}%);
      text-shadow:0 0 10px hsl(${hue},70%,32%);
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*4}s;
    `;
    document.body.appendChild(el);
  }
}

function buildKelp(){
  document.querySelectorAll('.kelp').forEach(e=>e.remove());
  const count=Math.floor(W()/150)+4;
  const isMobile = W() <= 767;
  for(let i=0;i<count;i++){
    const el=document.createElement('div'); el.className='kelp';
    const rows=isMobile ? 5+Math.floor(Math.random()*7) : 9+Math.floor(Math.random()*11);
    const stems=['│','┃','║','|'];
    let txt='';
    for(let r=rows;r>=0;r--){
      const branch=r>0&&r<rows&&Math.random()<.28;
      txt+=pick(stems)+(branch?(r%2===0?' ─╮':' ─╯'):'')+'\n';
    }
    txt+=pick(['╥','≈','~','∿']);
    el.textContent=txt;
    const hue=108+Math.random()*28;
    // Evenly slot across full width
    const slotW=100/count;
    const xPct=i*slotW + Math.random()*slotW*0.8;
    el.style.cssText=`
      left:${xPct}%;
      bottom:${14+Math.random()*6}px;
      font-size:${isMobile ? 9+Math.random()*4 : 14+Math.random()*5}px;
      color:hsl(${hue},52%,${20+Math.random()*10}%);
      text-shadow:0 0 12px hsl(${hue},62%,30%);
      animation-duration:${3+Math.random()*3.5}s;
      animation-delay:${Math.random()*5}s;
    `;
    document.body.appendChild(el);
  }
}

function buildSeabed(){
  const chars='·.,·.·,,·.·,·.'.split('');
  const n=Math.floor(W()/8)+8;
  $('seabed-txt').textContent=Array.from({length:n},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

function buildAllDecor(){
  buildSeabed();
  buildSeaweed();
  buildKelp();
}

/* ── HERMIT CRAB ── walks back and forth along the seabed */
function buildCrab(){
  document.querySelectorAll('.crab').forEach(e=>e.remove());

  const el=document.createElement('div');
  el.className='crab';
  // ASCII hermit crab: claws + body + pointed spiral shell
  // Facing right: claws out front, shell (the @> tip) trails behind
  el.style.cssText=`
    bottom: 28px;
    font-size: 15px;
    left: ${20+Math.random()*40}%;
  `;
  document.body.appendChild(el);

  // Crab state
  let cx = parseFloat(el.style.left)/100 * W();
  let dir = 1; // 1=right, -1=left
  const speed = 0.18 + Math.random()*0.12; // px per ms roughly
  let stepTimer = 0;
  let legPhase = 0; // flips legs for walking animation

  // Two frames of walking animation, facing each direction
  const frames = {
    right: [ 'v(·>{@>', 'v(·>(@>' ],
    left:  [ '<@{·)^', '<@(·)^' ],
  };

  function tick(ts){
    stepTimer += 0.6;
    legPhase = Math.floor(stepTimer / 18) % 2;

    // Pick glyph based on direction and leg phase
    const key = dir > 0 ? 'right' : 'left';
    el.textContent = frames[key][legPhase];

    // Move
    cx += dir * speed;

    // Bounce at edges with a small pause
    const minX = W()*0.02;
    const maxX = W()*0.92;
    if(cx > maxX){ cx = maxX; dir = -1; }
    if(cx < minX){ cx = minX; dir = 1; }

    el.style.left = cx + 'px';
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ══════════════════════════════════════
   FISH
   — bigger, fluid lerp movement
   — ~30% pink, rest mixed colors
   — no hands: wander randomly
   — hand present: ALL follow palm
══════════════════════════════════════ */
const SPECIES=[
  {r:'><(((·>',   l:'<·(((><'  },
  {r:'><((°>',    l:'<°((><'   },
  {r:'><{{{·>',   l:'<·{{{><'  },
  {r:'><((((º>',  l:'<º((((><' },
  {r:'><(((°>',   l:'<°(((><'  },
  {r:'><[[[·>',   l:'<·[[[><'  },
  {r:'><((((·>',  l:'<·((((><' },
  {r:'><{(((·>',  l:'<·(((}><' },
  {r:'><(·>',     l:'<·(><'    },
];

// ~30% pink shades, ~70% mixed
const PINK_COLORS=[
  {color:'#ff6eb4',glow:'#ff4da6'},
  {color:'#ff8dc8',glow:'#ff5aaa'},
  {color:'#ffb3d9',glow:'#ff6eb4'},
  {color:'#f48fb1',glow:'#ec407a'},
  {color:'#ff80ab',glow:'#ff4081'},
  {color:'#fc86c8',glow:'#e91e8c'},
];
const OTHER_COLORS=[
  {color:'#4fc3f7',glow:'#29b6f6'},   // sky blue
  {color:'#00e5ff',glow:'#00b8d4'},   // cyan
  {color:'#1a5276',glow:'#1a6fa8'},   // dark navy blue
  {color:'#ff6d00',glow:'#ff8f00'},   // deep orange
  {color:'#ffab40',glow:'#ff6d00'},   // amber orange
  {color:'#ff8a65',glow:'#ff5722'},   // coral orange
  {color:'#ffd740',glow:'#ffc400'},   // gold
  {color:'#ea80fc',glow:'#aa00ff'},   // bright purple
  {color:'#7c4dff',glow:'#651fff'},   // deep purple (small fish)
  {color:'#80cbc4',glow:'#009688'},   // sage
  {color:'#ffd180',glow:'#ffab40'},   // light orange
  {color:'#ff7043',glow:'#f4511e'},   // tomato orange
  {color:'#40c4ff',glow:'#0091ea'},   // light blue
];

const LAYERS=[
  {el:null,z:1,df:.6,ss:.85,ab:.55},
  {el:null,z:2,df:.82,ss:.94,ab:.75},
  {el:null,z:3,df:1.0,ss:1.0,ab:1.00},
];
LAYERS.forEach((l,i)=>{
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;inset:0;pointer-events:none;z-index:${15+i};`;
  document.body.appendChild(d); l.el=d;
});

class Fish{
  constructor(){
    const isMobile = W() <= 767; // Mobile detection for all optimizations

    this.sp=pick(SPECIES);
    this.L=LAYERS[Math.floor(Math.random()*3)];

    // ~30% pink
    const isPink=Math.random()<0.30;
    const col=isPink ? pick(PINK_COLORS) : pick(OTHER_COLORS);
    this.color=col.color; this.glow=col.glow;

    // Random size FIRST — used by speed and DOM below
    this.sizeScale = isMobile ? rnd(0.35, 1.0) : rnd(0.55, 1.6);

    // Personal offset from palm when following - spreads fish in a loose cloud
    // Random angle + distance so they form a natural cluster, not a grid
    const offAngle = Math.random() * Math.PI * 2;
    const offDist  = rnd(30, 110);
    this.followOffsetX = Math.cos(offAngle) * offDist;
    this.followOffsetY = Math.sin(offAngle) * offDist * 0.55; // flatter ellipse

    // Position — W() and H() called at construction time (inside startExperience)
    this.x=rnd(80, W()-180);
    this.y=rnd(60, H()-130);

    // Velocity — start in a random direction
    // Start swimming purely horizontally — left or right
    const spd=rnd(0.5,1.1);
    this.vx=(Math.random()<0.5?-1:1)*spd;
    this.vy=0;
    this.facing=this.vx>0?1:-1;

    // Per-fish tuning
    this.baseSpeed=(rnd(0.5,1.0))*this.L.df / (0.6 + this.sizeScale*0.4);
    this.prefY=rnd(60, H()-130);

    // Smooth wobble - reduced on mobile for better performance
    this.wobble=Math.random()*Math.PI*2;
    this.wAmp=isMobile ? rnd(0.08, 0.15) : rnd(0.15, 0.28);
    this.wSpd=isMobile ? rnd(0.015, 0.030) : rnd(0.028, 0.055);

    // How quickly this fish steers (lerp factor per frame)
    // Higher = snappier, lower = more floaty/fluid
    // Mobile: more responsive steering for smoother tracking
    this.steerK=isMobile ? rnd(0.035, 0.055) : rnd(0.018, 0.038);

    // State
    this.state='wander'; // wander | follow | flee | eat | idle
    this.fleeT=0; this.eatT=0; this.idleT=0;

    // Target velocity (lerped toward)
    this.tvx=this.vx; this.tvy=this.vy;

    // DOM
    this.el=document.createElement('div'); this.el.className='fish';
    this.sh=document.createElement('div'); this.sh.className='fish-shadow';
    const sz=Math.round(20*this.L.ss*this.sizeScale);
    this.el.style.cssText=`font-size:${sz}px;color:${this.color};opacity:${this.L.ab};filter:drop-shadow(0 0 ${Math.round(6*this.L.ss*this.sizeScale)}px ${this.glow});`;
    this.sh.style.cssText=`font-size:${sz}px;`;
    this.L.el.appendChild(this.sh);
    this.L.el.appendChild(this.el);
  }

  setState(s){
    if(this.state===s) return;
    this.state=s;
    // Always keep the fish's own color regardless of state
    this.el.style.color=this.color;
    this.el.style.filter=`drop-shadow(0 0 ${Math.round(6*this.L.ss*this.sizeScale)}px ${this.glow})`;
  }

  update(dt, foods, palmTarget, scared){
    this.wobble+=this.wSpd*dt;

    /* ── SCARE — pure radial flee from fist center like an explosion ── */
    if(scared && this.state!=='flee'){
      this.setState('flee');
      this.fleeT=90+Math.random()*60;
      const scareX = scareOrigin ? scareOrigin.x : W()/2;
      const scareY = scareOrigin ? scareOrigin.y : H()/2;
      const dx=this.x-scareX, dy=this.y-scareY;
      const dist=Math.hypot(dx,dy);
      // If fish is right on top of fist, give it a random outward push
      const angle = dist>1 ? Math.atan2(dy,dx) : Math.random()*Math.PI*2;
      const spd=(6.0+Math.random()*4.0)*this.L.df;
      this.tvx=Math.cos(angle)*spd;
      this.tvy=Math.sin(angle)*spd;
      // Pre-seed velocity so they lunge instantly
      this.vx=this.tvx*0.7;
      this.vy=this.tvy*0.7;
      if(Math.random()<.5) spawnBubbles(this.x,this.y,3);
    }

    /* ── STATE MACHINE ── */
    if(this.state==='flee'){
      this.fleeT-=dt;
      this.tvx*=0.97; this.tvy*=0.97;
      if(this.fleeT<=0) this.setState('wander');

    } else if(this.state==='eat'){
      this.eatT-=dt;
      this.tvx*=0.85; this.tvy*=0.85;
      if(this.eatT<=0){
        this.setState('wander');
        spawnBubbles(this.x,this.y,2+Math.floor(Math.random()*2));
      }

    } else if(this.state==='idle'){
      this.idleT-=dt;
      this.tvx*=0.90; this.tvy*=0.90;
      if(this.idleT<=0) this.setState('wander');

    } else {
      /* ── HAND PRESENT → fish follow palm, each to a personal offset slot ── */
      if(palmTarget){
        this.setState('follow');
        // Each fish has a fixed offset from palm center so they cluster without piling
        const tx = palmTarget.x + this.followOffsetX;
        const ty = palmTarget.y + this.followOffsetY;
        const dx=tx-this.x, dy=ty-this.y;
        const d=Math.hypot(dx,dy);

        // Always check food even while following — food takes priority
        // Mobile: reduce food checking frequency for better performance
        const isMobile = W() <= 767;
        let bestFood=null, bfd=isMobile ? 80 : 120;
        for(const f of foods){
          const fd=Math.hypot(f.x-this.x, f.y-this.y);
          if(fd<bfd){ bfd=fd; bestFood=f; }
        }
        if(bestFood){
          // Break from follow to eat
          const fdx=bestFood.x-this.x, fdy=bestFood.y-this.y, fd=Math.hypot(fdx,fdy);
          this.tvx=(fdx/fd)*this.baseSpeed*4.5; this.tvy=(fdy/fd)*this.baseSpeed*4.5;
          if(fd<18){ bestFood.eaten=true; this.setState('eat'); this.eatT=35+Math.random()*20; playEat(); }
        } else if(d>8){
          const spd=this.baseSpeed*2.2;
          this.tvx=(dx/d)*spd;
          this.tvy=(dy/d)*spd;
        } else {
          this.tvx*=0.88; this.tvy*=0.88;
        }
      } else {
        /* ── NO HAND → seek food or wander ── */
        if(this.state==='follow') this.setState('wander');

        // Check food — any fish can seek any food
        // Mobile: reduce food detection range for better performance
        const isMobile = W() <= 767;
        let best=null, bd=isMobile ? 180*this.L.df : 260*this.L.df;
        for(const f of foods){
          const d=Math.hypot(f.x-this.x, f.y-this.y);
          if(d<bd){ bd=d; best=f; }
        }
        if(best){
          const dx=best.x-this.x, dy=best.y-this.y, d=Math.hypot(dx,dy);
          const spd=this.baseSpeed*6.0;  // full sprint
          this.tvx=(dx/d)*spd; this.tvy=(dy/d)*spd;
          // Snap velocity immediately toward food — bypass lerp sluggishness
          this.vx=lerp(this.vx,this.tvx,0.35);
          this.vy=lerp(this.vy,this.tvy,0.35);
          if(d<18){ best.eaten=true; this.setState('eat'); this.eatT=35+Math.random()*20; playEat(); }
        } else {
          // Straight back-and-forth — maintain horizontal speed, kill vertical drift
          const currentSpd = Math.abs(this.tvx) || this.baseSpeed;
          this.tvx = Math.sign(this.tvx || this.facing) * currentSpd;
          this.tvy = 0; // no vertical drift at all
          // Gentle pull to preferred depth via wobble only — no steering
          // Flip direction at soft boundary edges
          if(this.x < 80)       this.tvx =  this.baseSpeed;
          if(this.x > W()-80)   this.tvx = -this.baseSpeed;
        }
      }
    }

    /* ── BOUNDARY — soft steer only within screen, no hard clamp ── */
    const mx=60, my=30, bot=60+my;
    // Only push back if NOT fleeing (fleeing fish can escape offscreen)
    if(this.state!=='flee'){
      if(this.x<mx)       this.tvx+=0.22*dt;
      if(this.x>W()-mx)   this.tvx-=0.22*dt;
      if(this.y<my)       this.tvy+=0.14*dt;
      if(this.y>H()-bot)  this.tvy-=0.18*dt;
    }

    /* ── FLUID LERP ── */
    const k=Math.min(this.steerK*dt, 0.25);
    this.vx=lerp(this.vx, this.tvx, k);
    this.vy=lerp(this.vy, this.tvy, k);

    /* ── MOVE ── */
    this.x+=this.vx*dt;
    this.y+=this.vy*dt + Math.sin(this.wobble)*this.wAmp;

    /* ── OFFSCREEN = dead, will be replaced by loop ── */
    const margin=180;
    this.offscreen=(this.x < -margin || this.x > W()+margin || this.y < -margin || this.y > H()+margin);

    /* ── FACE DIRECTION + ROTATION ── */
    if(Math.abs(this.vx)>0.02) this.facing=this.vx>0?1:-1;

    // Compute swim angle for tilt — cap vertical tilt at ±75°
    const speed=Math.hypot(this.vx,this.vy);
    let tiltDeg=0;
    if(speed>0.1){
      const rawAngle=Math.atan2(this.vy, Math.abs(this.vx))*180/Math.PI;
      tiltDeg=Math.max(-75, Math.min(75, rawAngle));
      // Flip sign for left-facing fish so tilt stays correct
      if(this.facing<0) tiltDeg=-tiltDeg;
    }

    /* ── RENDER ── */
    const glyph=this.facing>0?this.sp.r:this.sp.l;
    this.el.textContent=this.sh.textContent=glyph;
    const t=`translate(${this.x|0}px,${this.y|0}px) rotate(${tiltDeg.toFixed(1)}deg)`;
    this.el.style.transform=t;
    this.sh.style.transform=`translate(${(this.x+4)|0}px,${(this.y+6)|0}px) rotate(${tiltDeg.toFixed(1)}deg)`;
  }

  destroy(){ this.el.remove(); this.sh.remove(); }
}

/* ══════════════════════════════════════
   FOOD
══════════════════════════════════════ */
const FOOD_GL=['·','•','∘'];
class Food{
  constructor(x,y){
    this.x=x; this.y=y; this.vy=0.35+Math.random()*.25;
    this.eaten=false; this.age=0; this.maxAge=700;
    this.el=document.createElement('div'); this.el.className='food';
    this.el.textContent=pick(FOOD_GL);
    this.el.style.cssText=`left:${x}px;top:${y}px;color:${Math.random()<.5?'#ffd166':'#f9c74f'};`;
    document.body.appendChild(this.el);
  }
  update(dt){
    const fl=H()-58;
    if(this.y<fl){ this.y+=this.vy*dt; this.vy=Math.min(this.vy+.005,.8); this.el.style.top=(this.y|0)+'px'; }
    this.age+=dt;
    if(this.age>this.maxAge-80) this.el.style.opacity=Math.max(0,(this.maxAge-this.age)/80);
    return !this.eaten && this.age<this.maxAge;
  }
  destroy(){ this.el.remove(); }
}

function spawnBubbles(x,y,n){

    const b=document.createElement('div'); b.className='bubble';
    const sz=3+Math.random()*8, dur=1.2+Math.random()*1.5;

    document.body.appendChild(b); setTimeout(()=>b.remove(),(dur+.3)*1000);
  }
}
function spawnRing(x,y,sz,col,dur){
  const r=document.createElement('div'); r.className='ripple-ring';
  r.style.cssText=`left:${x}px;top:${y}px;width:${sz||60}px;height:${sz||60}px;border:1px solid ${col||'rgba(79,195,247,0.7)'};box-shadow:0 0 8px ${col||'rgba(79,195,247,0.3)'};animation-duration:${dur||.8}s;z-index:17;`;
  document.body.appendChild(r); setTimeout(()=>r.remove(),(dur||.8)*1000+50);
}

const sw=$('shockwave');
function triggerScare(x,y){
  playScare();
  sw.style.cssText=`left:${x}px;top:${y}px;width:40px;height:40px;opacity:.9;transition:none;transform:translate(-50%,-50%) scale(0);border:2px solid #00bcd4;box-shadow:0 0 20px #00bcd4,inset 0 0 12px rgba(0,188,212,0.2);`;

}

function showGestureLabel(txt,dur=900){

/* ══════════════════════════════════════
   GESTURE DETECTION
══════════════════════════════════════ */
let scared=false, scaredTimer=0;
let scareOrigin=null;
let pinching=false, pinchPos={x:0,y:0};
let palmTarget=null;

// Knock = make a fist, flick wrist DOWN sharply, twice within window
// Uses screen-pixel velocity of the wrist landmark (much easier to tune)
const KNOCK_WINDOW   = 1200;
const KNOCK_VEL_PX   = 16;    // sensitive enough to detect a real knock
const KNOCK_COOLDOWN = 350;

let knockCount   = 0;
let lastKnockT   = 0;
let lastKnockReg = 0;
let prevWristPx  = null;      // previous wrist Y in screen pixels
let inDownStroke = false;     // true once we've started a downward stroke

const THUMB_TIP=4,INDEX_TIP=8,MIDDLE_TIP=12,RING_TIP=16,PINKY_TIP=20;
const WRIST=0,INDEX_MCP=5,MIDDLE_MCP=9,RING_MCP=13,PINKY_MCP=17;

function getPalmCenter(hand){
  const pts=[WRIST,5,9,13,17].map(i=>toScreen(hand[i]));
  return { x:pts.reduce((s,p)=>s+p.x,0)/pts.length, y:pts.reduce((s,p)=>s+p.y,0)/pts.length };
}

function isPinching(hand){
  const t=hand[THUMB_TIP],i=hand[INDEX_TIP];
  return Math.hypot((1-t.x)*W()-(1-i.x)*W(),t.y*H()-i.y*H())<44;
}

// Fist = all 4 fingers deeply curled (tips well below MCPs) AND thumb curled in
function isFist(hand){
  const tips=[INDEX_TIP,MIDDLE_TIP,RING_TIP,PINKY_TIP];
  const mcps=[INDEX_MCP,MIDDLE_MCP,RING_MCP,PINKY_MCP];
  let curled=0;
  for(let i=0;i<4;i++){
    // Require tip to be significantly below MCP (0.07 vs old 0.02) — much stricter
    if(hand[tips[i]].y > hand[mcps[i]].y + 0.07) curled++;
  }
  // Also require thumb to be near the index MCP (tucked in), not extended
  const thumbTucked = Math.hypot(
    hand[THUMB_TIP].x - hand[INDEX_MCP].x,
    hand[THUMB_TIP].y - hand[INDEX_MCP].y
  ) < 0.18;
  return curled>=4 && thumbTucked;
}

function processGestures(multiHandLandmarks){
  const palmCursor=$('palm-cursor');

  if(!multiHandLandmarks||!multiHandLandmarks.length){
    palmTarget=null;
    palmCursor.style.opacity='0';
    if(pinching){ pinching=false; $('pinch-food').style.opacity='0'; }
    prevWristPx=null; inDownStroke=false;
    return;
  }

  const hand=multiHandLandmarks[0];
  const palm=getPalmCenter(hand);
  const indexTip=toScreen(hand[INDEX_TIP]);
  const thumbTip=toScreen(hand[THUMB_TIP]);
  const now=performance.now();
  const wristPx=hand[WRIST].y * H(); // wrist Y in screen pixels

  palmCursor.style.left=indexTip.x+'px';
  palmCursor.style.top=indexTip.y+'px';
  palmCursor.style.opacity='1';
  palmTarget=indexTip;  // follow index fingertip

  const nowFist=isFist(hand);

  /* ── KNOCK DETECTION ──
     Fist held, wrist dips DOWN sharply (px/frame).
     Each downward stroke edge = one knock.
     Two knocks within KNOCK_WINDOW = scare.
     Fist opening between knocks is fine — just resets stroke tracking.
  ── */
  if(prevWristPx!==null){
    const dy=wristPx - prevWristPx; // positive = moving down

    if(nowFist){
      // Detect start of downward stroke — ONE knock = scare
      if(dy > KNOCK_VEL_PX && !inDownStroke){
        inDownStroke=true;
        if(now - lastKnockReg > KNOCK_COOLDOWN){
          lastKnockReg=now;
          scareOrigin={x:palm.x, y:palm.y};
          triggerScare(palm.x, palm.y);
          showGestureLabel('scattered', 1500);
        }
      }
      // Reset stroke flag when wrist stops or goes back up
      if(dy < 2) inDownStroke=false;
    } else {
      inDownStroke=false;
    }
  }

  prevWristPx=wristPx;

  /* ── PINCH — hold food, release = drop ── */
  if(!nowFist){
    const nowPinch=isPinching(hand);
    const midX=(thumbTip.x+indexTip.x)/2;
    const midY=(thumbTip.y+indexTip.y)/2;

    if(nowPinch&&!pinching){
      pinching=true; pinchPos={x:midX,y:midY};
      playPinch(); showGestureLabel('holding food');
    }
    if(nowPinch&&pinching){
      const pf=$('pinch-food');
      pf.style.left=midX+'px'; pf.style.top=midY+'px'; pf.style.opacity='1';
      pinchPos={x:midX,y:midY};
    }
    if(!nowPinch&&pinching){
      pinching=false; $('pinch-food').style.opacity='0';
      const n=3+Math.floor(Math.random()*3);
      for(let i=0;i<n;i++) foods.push(new Food(pinchPos.x+(Math.random()-.5)*34,pinchPos.y+4));
      spawnRing(pinchPos.x,pinchPos.y,50,'rgba(255,209,102,0.7)',.7);
      addRipple(pinchPos.x,pinchPos.y,70,'rgba(255,209,102,',1.3);
      playPlop(); showGestureLabel('feeding time',1200);
      spawnAttracted(); // food attracts fish from the sides
    }
  }
}

/* ══════════════════════════════════════
   MAIN STATE
══════════════════════════════════════ */
let fishes=[], foods=[], ambT=0;

// Separation radius — fish push away from each other within this distance
const SEP_RADIUS = 55;
const SEP_FORCE  = 0.55;

function applyFishSeparation(){
  for(let i=0;i<fishes.length;i++){
    for(let j=i+1;j<fishes.length;j++){
      const a=fishes[i], b=fishes[j];
      const dx=a.x-b.x, dy=a.y-b.y;
      const d=Math.hypot(dx,dy);
      // Separation radius scales with the size of each fish
      const sep=SEP_RADIUS*(a.sizeScale+b.sizeScale)*0.6;
      if(d<sep && d>0.1){
        const force=SEP_FORCE*(1-(d/sep));
        const nx=dx/d, ny=dy/d;
        a.tvx+=nx*force; a.tvy+=ny*force;
        b.tvx-=nx*force; b.tvy-=ny*force;
      }
    }
  }
}

/* ══════════════════════════════════════
   START
══════════════════════════════════════ */
async function startExperience(){
  $('permission-screen').style.display='none';
  const video=$('video');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'},audio:false});
    video.srcObject=stream; await video.play();
  }catch(e){
    alert('Camera permission denied. Please allow camera access and reload.');
    return;
  }

  resizeCanvas();
  buildAllDecor();

  // Spawn 14 fish with stagger
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      fishes.push(new Fish());
      $('count-num').textContent=fishes.length;
    }, 280+i*150);
  }

  // Intro wipe
  setTimeout(()=>{
    $('intro').classList.add('wipe');
    setTimeout(()=>$('intro').style.display='none',950);
  },1200);

  // MediaPipe
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.7,minTrackingConfidence:.6});
  hands.onResults(results=>{
    drawHandOverlay(results.multiHandLandmarks);
    processGestures(results.multiHandLandmarks);
  });
  const mpCam=new Camera(video,{
    onFrame:async()=>{ await hands.send({image:video}); },
    width:1280, height:720
  });
  mpCam.start();

  requestAnimationFrame(loop);
}

/* ══════════════════════════════════════
   LOOP
══════════════════════════════════════ */
let lastTs=0;
// Mobile: reduce fish count for better performance
const isMobile = W() <= 767;
const MIN_FISH=isMobile ? 6 : 8, MAX_FISH=isMobile ? 15 : 20;
let spawnCooldown=0;

function spawnFromEdge(){
  const f=new Fish();
  const edge=Math.floor(Math.random()*4);
  if(edge===0){ f.x=rnd(50,W()-50); f.y=-60; f.vx=(Math.random()-.5)*1; f.vy=rnd(0.4,1.0); }
  else if(edge===1){ f.x=W()+60; f.y=rnd(60,H()-80); f.vx=-rnd(0.5,1.1); f.vy=(Math.random()-.5)*.4; }
  else if(edge===2){ f.x=rnd(50,W()-50); f.y=H()+60; f.vx=(Math.random()-.5)*1; f.vy=-rnd(0.4,1.0); }
  else { f.x=-60; f.y=rnd(60,H()-80); f.vx=rnd(0.5,1.1); f.vy=(Math.random()-.5)*.4; }
  f.tvx=f.vx; f.tvy=f.vy;
  fishes.push(f);
  $('count-num').textContent=fishes.length;
}

// Feeding attracts fish from the sides
function spawnAttracted(){
  if(fishes.length>=MAX_FISH+4) return; // allow a small burst above max when feeding
  const count=2+Math.floor(Math.random()*3);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(fishes.length>=MAX_FISH+4) return;
      const f=new Fish();
      // Enter from left or right only, at a natural swim height
      if(Math.random()<0.5){
        f.x=-60; f.y=rnd(80,H()-120); f.vx=rnd(0.6,1.2); f.vy=0;
      } else {
        f.x=W()+60; f.y=rnd(80,H()-120); f.vx=-rnd(0.6,1.2); f.vy=0;
      }
      f.tvx=f.vx; f.tvy=f.vy;
      fishes.push(f);
      $('count-num').textContent=fishes.length;
    }, i*400+Math.random()*300);
  }
}

function loop(ts){
  const dt=Math.min((ts-lastTs)/16, 3.5); lastTs=ts;
  if(scared){ scaredTimer-=dt; if(scaredTimer<=0) scared=false; }

  applyFishSeparation();
  for(const f of fishes) f.update(dt,foods,palmTarget,scared);

  // Cull fish that swam offscreen
  const before=fishes.length;
  fishes=fishes.filter(f=>{ if(f.offscreen){ f.destroy(); return false; } return true; });
  if(fishes.length<before) $('count-num').textContent=fishes.length;

  // Natural population — spawn if below min, random chance up to max
  spawnCooldown-=dt;
  if(spawnCooldown<=0){
    if(fishes.length<MIN_FISH){
      // Always replenish if too sparse
      spawnFromEdge();
      spawnCooldown=20+Math.random()*30;
    } else if(fishes.length<MAX_FISH && Math.random()<0.012){
      // Random wanderer swims in occasionally
      spawnFromEdge();
      spawnCooldown=60+Math.random()*120;
    } else {
      spawnCooldown=30;
    }
  }

  foods=foods.filter(f=>{ const alive=f.update(dt); if(!alive)f.destroy(); return alive; });
  drawRipples();
  ambT+=dt;
  if(ambT>22){ if(Math.random()<.28) spawnBubbles(20+Math.random()*(W()-40),H()-58,1); ambT=0; }
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{ resizeCanvas(); buildAllDecor(); });
</script>
</body>
